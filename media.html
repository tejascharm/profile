<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Media | Tejas</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-header { padding-top: 8rem; padding-bottom: 2rem; text-align: center; }
        
        .gallery-grid {
            column-count: 3;
            column-gap: 1.5rem;
            margin-bottom: 4rem;
        }

        @media (max-width: 900px) { .gallery-grid { column-count: 2; } }
        @media (max-width: 600px) { .gallery-grid { column-count: 1; } }

        .gallery-item {
            break-inside: avoid;
            margin-bottom: 1.5rem;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            transform: translateZ(0);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s ease;
        }
        .gallery-item:hover img { transform: scale(1.03); }

        .media-link-card {
            background: var(--color-surface);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--color-accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .media-link-card h3 { margin: 0; font-family: var(--font-body); font-size: 1.1rem; color: #fff;}
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">TEJAS</div>
        <div class="hamburger">
            <span></span><span></span><span></span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="portfolio.html">CV & Media</a></li>
            <li><a href="media.html" class="active">Updates</a></li>
            <li><a href="blog.html">Blog</a></li>
        </ul>
    </nav>

    <header class="page-header container reveal active">
        <h1 class="text-accent">Latest Updates & Media</h1>
        <p class="text-muted">A dynamic collection of my latest photos and video links.</p>
    </header>

    <!-- Uploaded Videos Section -->
    <section class="container reveal active">
        <h2 style="margin-bottom:2rem; color:#fff;">Newest Videos & Links</h2>
        <div id="video-container" style="max-width:800px; margin:0 auto;">
            <!-- Videos will load here via JavaScript -->
        </div>
    </section>

    <!-- Uploaded Photos Section -->
    <section class="container reveal active" style="margin-top:4rem;">
        <h2 style="margin-bottom:2rem; color:#fff;">Latest Photo Additions</h2>
        <div class="gallery-grid" id="photo-container">
            <!-- Photos will load here via JavaScript -->
        </div>
    </section>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    
    <!-- Simple JS to act as the "database" since there is no PHP running -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // EDIT THESE ARRAYS TO ADD MORE MEDIA MANUALLY IF USING PURE HTML
            
            // To add a YouTube video, use type: "youtube" and put the embed ID (e.g. dQw4w9WgXcQ) in source.
            // To add an MP4 you copied to this folder, use type: "mp4" and put the filename in source.
            const recentVideos = [
                { title: "Theatre Monologue Promo", type: "youtube", source: "y81eOAqEa48" }, 
                // Example of adding an MP4: { title: "Short Clip", type: "mp4", source: "myclip.mp4" }
            ];

            // Put your image file names here
            const recentPhotos = [
                "pic1.jpeg", 
                "pic2.jpeg",
                "pic3.jpeg",
                "pic4.jpeg",
                "pic5.jpeg",
                "pic6.jpeg",
                "thpic1.jpeg",
                "thpic2.jpeg",
                "thpic3.jpeg"
            ];

            // Render Videos
            const vidContainer = document.getElementById('video-container');
            if (recentVideos.length === 0) {
                vidContainer.innerHTML = '<p class="text-muted">No video links added yet.</p>';
            } else {
                recentVideos.forEach(vid => {
                    let mediaElement = '';
                    if (vid.type === "youtube") {
                        mediaElement = `<iframe width="100%" height="400" src="https://www.youtube.com/embed/${vid.source}" title="${vid.title}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="border-radius: 8px;"></iframe>`;
                    } else if (vid.type === "mp4") {
                        mediaElement = `<video width="100%" height="400" controls style="border-radius: 8px; background: #000;"><source src="${vid.source}" type="video/mp4">Your browser does not support the video tag.</video>`;
                    }

                    vidContainer.innerHTML += `
                        <div class="media-link-card" style="flex-direction: column; align-items: stretch; gap: 1rem;">
                            <h3 style="margin-bottom:0.5rem; text-align: left;">${vid.title}</h3>
                            ${mediaElement}
                        </div>
                    `;
                });
            }

            // Render Photos
            const photoContainer = document.getElementById('photo-container');
            if (recentPhotos.length === 0) {
                photoContainer.innerHTML = '<p class="text-muted text-center" style="margin-bottom:10rem;">No extra photos uploaded yet.</p>';
            } else {
                recentPhotos.forEach(photo => {
                    photoContainer.innerHTML += `
                        <div class="gallery-item">
                            <img src="${photo}" alt="Uploaded Media">
                        </div>
                    `;
                });
            }
        });
    </script>
</body>
</html>
